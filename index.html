<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  :root {
    --teal-black:#111;--teal-mint:#D4ECE6;--teal-dark:#071412;--teal-white:#FFF;
    --warm-grey:#F2F2F0;--mid-grey:#999;--dark-grey:#555;--mint-light:#EDF7F4;
    --red:#E54D42;--green:#2D8659;--yellow:#D4A017;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',sans-serif;background:var(--warm-grey);color:var(--teal-black);line-height:1.5;font-size:14px}
  .app{min-height:100vh;display:flex;flex-direction:column}
  .hdr{background:var(--teal-dark);color:var(--teal-mint);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .hdr-left{display:flex;align-items:center;gap:12px}
  .hdr .sub{color:var(--mid-grey);font-size:13px;font-weight:400}
  .tabs{display:flex;gap:2px;background:var(--teal-dark);padding:0 28px;overflow-x:auto}
  .tab{padding:10px 18px;background:0;color:var(--mid-grey);border:0;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:.15s;font-family:inherit}
  .tab:hover{color:var(--teal-mint)}.tab.on{color:var(--teal-mint);border-bottom-color:var(--teal-mint)}
  .main{max-width:1200px;margin:0 auto;padding:24px;width:100%;flex:1}
  .card{background:var(--teal-white);border-radius:8px;padding:24px;margin-bottom:16px;border:1px solid #e0e0de}
  .card-h{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--dark-grey);margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid #e0e0de}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:12px}
  .row3{grid-template-columns:1fr 1fr 1fr}.row4{grid-template-columns:1fr 1fr 1fr 1fr}.full{grid-template-columns:1fr}
  .fg{display:flex;flex-direction:column;gap:4px}
  .fg label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--dark-grey)}
  .fg input,.fg select,.fg textarea{padding:8px 12px;border:1px solid #d0d0ce;border-radius:4px;font-size:14px;font-family:inherit;background:var(--teal-white);transition:.15s}
  .fg input:focus,.fg select:focus,.fg textarea:focus{outline:0;border-color:var(--teal-dark)}
  .fg textarea{resize:vertical;min-height:80px}
  .btn{padding:8px 16px;border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;border:0;transition:.15s;display:inline-flex;align-items:center;gap:6px;font-family:inherit}
  .btn-p{background:var(--teal-dark);color:var(--teal-mint)}.btn-p:hover{background:#0a1f1b}
  .btn-s{background:var(--teal-mint);color:var(--teal-dark)}.btn-s:hover{background:#c2e3da}
  .btn-g{background:0;color:var(--dark-grey);border:1px solid #d0d0ce}.btn-g:hover{background:var(--warm-grey)}
  .btn-sm{padding:4px 10px;font-size:12px}
  .bt{width:100%;border-collapse:collapse;font-size:13px}
  .bt th{text-align:left;padding:8px 12px;background:var(--warm-grey);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--dark-grey);border-bottom:2px solid #d0d0ce}
  .bt td{padding:6px 12px;border-bottom:1px solid #eee;vertical-align:middle}
  .bt tbody tr:not(.ph):not(.sub):not(.tot):hover{background:var(--mint-light)}
  .bt .ph{background:var(--teal-dark);color:var(--teal-mint);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.5px}
  .bt .ph td{padding:10px 12px;border:0}
  .bt .sub{background:var(--warm-grey);font-weight:600}
  .bt .tot{background:var(--teal-dark);color:var(--teal-white);font-weight:700;font-size:14px}
  .bt .tot td{padding:12px;border:0}
  .bt input,.bt select{width:100%;padding:4px 8px;border:1px solid #d0d0ce;border-radius:3px;font-size:13px;font-family:inherit;background:0}
  .bt input:focus,.bt select:focus{outline:0;border-color:var(--teal-dark);background:#fff}
  .bt input[type=number]{text-align:right}
  .mbar{display:flex;align-items:center;gap:12px;padding:14px;border-radius:6px;font-weight:600;margin-top:16px}
  .mbar.ok{background:#e8f5e9;color:var(--green)}.mbar.warn{background:#fff8e1;color:var(--yellow)}.mbar.bad{background:#fce4ec;color:var(--red)}
  .gantt-r{display:flex;align-items:center;margin-bottom:4px}
  .gantt-l{width:180px;flex-shrink:0;font-size:13px;font-weight:500;padding:8px 0}
  .gantt-t{flex:1;height:32px;position:relative;background:var(--warm-grey);border-radius:4px}
  .gantt-b{position:absolute;height:100%;border-radius:4px;display:flex;align-items:center;padding:0 8px;font-size:11px;font-weight:600;color:var(--teal-dark);min-width:40px}
  .start{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center}
  .start h2{font-size:28px;margin-bottom:8px;color:var(--teal-dark)}
  .start p{color:var(--dark-grey);margin-bottom:32px;max-width:500px}
  .tsel{display:flex;gap:12px;width:100%;max-width:600px}
  .tc{flex:1;padding:20px;border:2px solid #d0d0ce;border-radius:8px;cursor:pointer;transition:.15s;text-align:center}
  .tc:hover{border-color:var(--teal-dark)}.tc.on{border-color:var(--teal-dark);background:var(--mint-light)}
  .tc h3{font-size:16px;margin-bottom:4px}.tc p{font-size:12px;color:var(--dark-grey)}
  .prev{background:#fff;padding:56px 52px;max-width:800px;margin:0 auto;border:1px solid #d0d0ce;box-shadow:0 2px 8px rgba(0,0,0,.06);font-size:13px;line-height:1.7;color:#111}
  .prev .sec-h{font-size:18px;font-weight:600;margin:32px 0 14px;color:#111}
  .prev h3{font-size:13px;margin:14px 0 4px;font-weight:700}
  .prev table{width:100%;border-collapse:collapse;margin:10px 0;font-size:12px}
  .prev table th{background:#f0f0ee;padding:8px 12px;text-align:left;font-size:12px;font-weight:600;border-bottom:1px solid #d0d0ce}
  .prev table td{padding:8px 12px;border-bottom:1px solid #eee}
  .prev table .label-cell{background:#f0f0ee;font-weight:500;width:160px}
  .prev .foot{margin-top:48px;padding-top:12px;border-top:1px solid #ddd;font-size:9px;color:#999;display:flex;justify-content:space-between;align-items:flex-end}
  .flex{display:flex}.between{display:flex;justify-content:space-between;align-items:center}
  .g8{gap:8px}.g16{gap:16px}.mt16{margin-top:16px}.mt24{margin-top:24px}.mb16{margin-bottom:16px}
  .tr{text-align:right}.mono{font-size:12px}.sm{font-size:12px}.muted{color:var(--mid-grey)}
  @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  @media(max-width:768px){.row,.row3,.row4{grid-template-columns:1fr}.tsel{flex-direction:column}.main{padding:16px}.hdr{padding:12px 16px}.tabs{padding:0 16px}.prev{padding:24px}}

// ── Totals helper ──
function calcTotals(d){
  // Block A: TEAL fees (skip disabled phases)
  const phaseData=(d.phases||[]).map(p=>{
    if(p.enabled===false)return{client:0,cost:0,cont:0,total:0};
    const client=(p.items||[]).reduce((s,it)=>s+(it.qty||0)*(it.extRate||0),0);
    const cost=(p.items||[]).reduce((s,it)=>s+(it.qty||0)*(it.intRate||0),0);
    const cont=client*(p.contingency||0);
    return{client,cost,cont,total:client+cont};
  });
  const blockAClient=phaseData.reduce((s,p)=>s+p.total,0);
  const blockACost=phaseData.reduce((s,p)=>s+p.cost,0);

  // Block B1: Off-the-shelf
  let b1Purchase=0,b1Handling=0;
  (d.procOTS||[]).forEach(it=>{
    const v=it.amount||0;
    b1Purchase+=v;
    b1Handling+=v*(it.handlingPct!=null?it.handlingPct:getHandlingPct(v));
  });

  // Block B2: Custom
  let b2Purchase=0,b2Handling=0,b2Risk=0;
  (d.procCustom||[]).forEach(it=>{
    const v=it.amount||0;
    b2Purchase+=v;
    b2Handling+=v*(it.handlingPct!=null?it.handlingPct:getHandlingPct(v));
    b2Risk+=v*(it.riskPct||0);
  });

  // Block C: Subcontractors
  let subFees=0,subCoord=0;
  (d.subs||[]).forEach(it=>{
    const v=it.amount||0;
    subFees+=v;
    subCoord+=v*(it.coordPct!=null?it.coordPct:COORD_MARGIN);
  });

  const procClient=b1Purchase+b1Handling+b2Purchase+b2Handling+b2Risk;
  const procCost=b1Purchase+b2Purchase;
  const subClient=subFees+subCoord;

  const grandClient=blockAClient+procClient+subClient;
  const grandCost=blockACost+procCost+subFees;
  const margin=grandClient>0?(grandClient-grandCost)/grandClient:0;

  return{phaseData,blockAClient,blockACost,b1Purchase,b1Handling,b2Purchase,b2Handling,b2Risk,
    procClient,procCost,subFees,subCoord,subClient,grandClient,grandCost,margin};
}

const GOOGLE_CID_KEY='teal.google.clientId';
const GOOGLE_SCOPES='https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/documents https://www.googleapis.com/auth/drive.file';

const googleState={token:null,gapiReady:false,gisReady:false};

function getGoogleClientId(){return localStorage.getItem(GOOGLE_CID_KEY)||'';}
function setGoogleClientId(id){localStorage.setItem(GOOGLE_CID_KEY,id);}

function initGapi(){
  return new Promise((resolve,reject)=>{
    if(googleState.gapiReady){resolve();return;}
    if(!window.gapi){reject(new Error('Google API niet geladen. Herlaad de pagina.'));return;}
    gapi.load('client',async()=>{
      await gapi.client.init({});
      await gapi.client.load('sheets','v4');
      await gapi.client.load('docs','v1');
      await gapi.client.load('drive','v3');
      googleState.gapiReady=true;
      resolve();
    });
  });
}

function googleAuth(){
  return new Promise((resolve,reject)=>{
    const cid=getGoogleClientId();
    if(!cid){reject(new Error('NO_CLIENT_ID'));return;}
    if(googleState.token){
      gapi.client.setToken(googleState.token);
      resolve(googleState.token);return;
    }
    if(!window.google?.accounts?.oauth2){reject(new Error('Google Identity Services niet geladen.'));return;}
    const client=google.accounts.oauth2.initTokenClient({
      client_id:cid,scope:GOOGLE_SCOPES,
      callback:(resp)=>{
        if(resp.error){reject(new Error(resp.error));return;}
        googleState.token=resp;
        gapi.client.setToken(resp);
        resolve(resp);
      },
      error_callback:(err)=>reject(new Error(err.message||'Auth mislukt')),
    });
    client.requestAccessToken();
  });
}

async function ensureGoogleAuth(){
  await initGapi();
  await googleAuth();
}

      rows.push(['',it.desc||'Custom',1,{v:it.amount,f:fmtE(it.amount)},{v:it.amount+h+r,f:fmtE(it.amount+h+r)}]);
    });
  }
  rows.push(['','','',NL?'Subtotaal B':'Subtotal B',{v:totals.procClient,f:fmtE(totals.procClient)}]);

  // Block C: Subcontractors
  if(d.subs?.length){

    d.subs.forEach(it=>{
      if(!it.amount)return;

  ins(NL?'OFFERTE':'QUOTATION',true,16,'HEADING_1');nl();
  nl();

  // Client + details
  ins(ll.klantLabel,true,12,'HEADING_2');nl();
  const cl=d.client||{};
  if(cl.name){ins(cl.name);nl();}
  if(cl.contact){ins(cl.contact);nl();}
  if(cl.email){ins(cl.email);nl();}
  if(cl.addr){ins(`${cl.addr}, ${cl.zip||''} ${cl.city||''}`);nl();}
  nl();

  ins(ll.detailsLabel,true,12,'HEADING_2');nl();
  const proj=d.project||{};const cond=d.conditions||{};
  ins(`${ll.referentieLabel}: ${d.ref||''}`);nl();
  ins(`${ll.datumPrev}: ${fmtDateLong(proj.date)}`);nl();
  ins(`${ll.geldigTot}: ${cond.validity||30} ${NL?'dagen':'days'}`);nl();
  if(proj.location){ins(`${ll.locatie}: ${proj.location}`);nl();}
  nl();

  // Project description
  if(t(proj.description,L)){
    ins(ll.projectBeschrijving,true,12,'HEADING_2');nl();
    ins(t(proj.description,L));nl();nl();
  }
  if(t(proj.tealRole,L)){
    ins(ll.rolTeal,true,11);nl();
    ins(t(proj.tealRole,L));nl();nl();
  }

  // Scope & phases
  ins(ll.scopeTimeline,true,12,'HEADING_2');nl();
  activePhases.forEach(ph=>{
    const desc=t(ph.description,L);
    ins(`${pn(ph)}`,true);nl();
    if(desc){ins(desc);nl();}
    nl();
  });

  // Financial overview
  ins(ll.kostenLabel,true,12,'HEADING_2');nl();
  finLines.forEach(fl=>{
    ins(`${fl.desc}: ${fmtE(fl.total)}`);nl();
  });
  nl();
  ins(`${NL?'Totaal (excl. BTW)':'Total (excl. VAT)'}: ${fmtE(totals.grandClient)}`,true,13);nl();
  nl();

  // Payment
  const milestones=d.payment?.milestones||[];
  ins(ll.betaling,true,12,'HEADING_2');nl();
  const milestoneDateISOs=()=>{
    if(!proj.date||!milestones.length)return milestones.map(()=>'');
    const totalW=activePhases.reduce((s,ph)=>Math.max(s,(ph.startWeek||0)+(ph.durationWeeks||4)),0)||1;
    const n=milestones.length;
    return milestones.map((_,i)=>{
      const wk=Math.round((i/(n-1||1))*totalW);
      const dt=new Date(proj.date);dt.setDate(dt.getDate()+wk*7);
      return dt.toISOString().slice(0,10);
    });
  };
  const mDates=milestoneDateISOs();
  milestones.forEach((ms,i)=>{
    const amt=totals.grandClient*(ms.pct||0)/100;
    const dateStr=mDates[i]?', '+fmtMonth(mDates[i]):'';
    ins(`${t(ms.name,L)}: ${ms.pct}% (${fmtE(amt)}${dateStr})`);nl();
  });
  nl();

  // Terms
  ins(ll.voorwaardenLabel,true,12,'HEADING_2');nl();
  ins(`${ll.geldigheidVw}: ${cond.validity||30} ${NL?'dagen':'days'}`);nl();
  ins(`${ll.betalingstermijn}: ${cond.paymentTerm||14} ${NL?'dagen':'days'}`);nl();
  if(t(cond.warranty,L)){ins(`${ll.garantieLabel}: ${t(cond.warranty,L)}`);nl();}
  if(t(proj.exclusions,L)){ins(`${ll.exclusionsVw}: ${t(proj.exclusions,L)}`);nl();}
  ins(ll.avTekst);nl();
  ins(ll.meerwerkTekst);nl();
  nl();

  // Signature
  ins(ll.akkoord,true,12,'HEADING_2');nl();
  ins(ll.akkoordTekst);nl();
  nl();
  ins('____________________________          ____________________________');nl();
  ins(`${NL?'Handtekening':'Signature'}                                        ${NL?'Datum':'Date'}`);nl();

  // Execute all requests
  await gapi.client.docs.documents.batchUpdate({documentId:docId,resource:{requests:reqs}});

  return `https://docs.google.com/document/d/${docId}`;
}

const PLANNER_URL='https://teamteal-planner.vercel.app/';
const GROUP_PALETTE=['#D4ECE6','#B8D8CE','#9CCAB6','#80BC9E','#64AE86','#48A06E','#6BB5A0','#4A9E84','#2D8659','#1A6B44'];

function exportToPlanner(d){
  const L=d.lang||'nl';const NL=L==='nl';
  const pn=(ph)=>ph.customName||t(ph.name,L);
  const activePhases=(d.phases||[]).filter(p=>p.enabled!==false);
  const projectStart=(d.project||{}).date||new Date().toISOString().slice(0,10);
  const addDays=(iso,days)=>{const dt=new Date(iso);dt.setDate(dt.getDate()+days);return dt.toISOString().slice(0,10);};

  // Calculate project end from phases
  const totalWeeks=activePhases.reduce((s,ph)=>Math.max(s,(ph.startWeek||0)+(ph.durationWeeks||4)),0)||1;
  const endDate=addDays(projectStart,totalWeeks*7+14);

  // Each phase becomes a group; items within become tasks
  const groups=[];
  const tasks=[];
  let tid=1;

  activePhases.forEach((ph,pi)=>{
    const gid='g_'+ph.id;
    const sw=ph.startWeek||0;const dw=ph.durationWeeks||4;
    const phStart=addDays(projectStart,sw*7);
    const phEnd=addDays(projectStart,(sw+dw)*7);

    groups.push({id:gid,name:pn(ph),color:GROUP_PALETTE[pi%GROUP_PALETTE.length],expanded:true});

    // Start milestone
    tasks.push({id:'t_'+(tid++),name:NL?'Start '+pn(ph):'Start '+pn(ph),groupId:gid,categoryId:null,
      start:phStart,end:phStart,assignee:'',personId:null,people:1,note:'',milestone:true});

    // Tasks from role items (spread across phase duration)
    const items=(ph.items||[]).filter(it=>it.qty>0);
    if(items.length){
      const slotW=Math.max(1,Math.floor(dw/items.length));
      items.forEach((it,ii)=>{
        const r=roleMap[it.role];
        const taskStart=addDays(projectStart,(sw+ii*slotW)*7);
        const taskEnd=addDays(projectStart,(sw+Math.min((ii+1)*slotW,dw))*7);
        const label=(t(r?.name,L)||it.role)+(it.qty?' ('+it.qty+(NL?'u':'h')+')':'');
        tasks.push({id:'t_'+(tid++),name:label,groupId:gid,categoryId:null,
          start:taskStart,end:taskEnd,assignee:t(r?.name,L)||it.role,personId:null,people:1,
          note:'',milestone:false});
      });
    }else{
      // No items: create a single block for the phase
      tasks.push({id:'t_'+(tid++),name:pn(ph),groupId:gid,categoryId:null,
        start:phStart,end:phEnd,assignee:'',personId:null,people:1,
        note:t(ph.description,L)||'',milestone:false});
    }

    // Internal review halfway
    const midDate=addDays(projectStart,(sw+Math.floor(dw/2))*7);
    tasks.push({id:'t_'+(tid++),name:NL?'Review':'Review',groupId:gid,categoryId:null,
      start:midDate,end:midDate,assignee:'',personId:null,people:1,note:'',milestone:true});

    // Delivery milestone at end
    tasks.push({id:'t_'+(tid++),name:NL?'Oplevering '+pn(ph):'Delivery '+pn(ph),groupId:gid,categoryId:null,
      start:phEnd,end:phEnd,assignee:'',personId:null,people:1,note:'',milestone:true});
  });

  // Build planner state (v4 schema)
  const state={
    version:4,
    title:(d.project||{}).name||(NL?'Offerte planning':'Quotation planning'),
    start:projectStart,
    end:endDate,
    categories:[],
    people:[],
    groups,
    tasks,
    deps:[],
    holidays:[],
    holidayExclusions:[],
  };

  // Compress and build URL (view-only)
  const packed=LZString.compressToEncodedURIComponent(JSON.stringify(state));
  return PLANNER_URL+'#s='+packed;
}

                {ph.code} - {phaseName(ph)}
              </span>

function PlanningTab({data:d,set}){
  const L=d.lang;const ll=L_(L);
  const active=d.phases.filter(p=>p.enabled!==false);
  const total=Math.max(16,...active.map(p=>(p.startWeek||0)+(p.durationWeeks||4)));
  const upPh=(i,k,v)=>{const p=[...d.phases];p[i]={...p[i],[k]:v};set({...d,phases:p})};
  const phaseName=(ph)=>ph.customName||t(ph.name,L);
  return <div className="card">
    <div className="card-h">{ll.planningTitle}</div>
    <div style={{overflowX:'auto'}}>
      {d.phases.map((ph,pi)=>{
        if(ph.enabled===false)return null;
        const left=((ph.startWeek||0)/total)*100;

        return <div key={ph.id} className="gantt-r">
          <div className="gantt-l">{ph.code} - {phaseName(ph)}</div>
          <div className="gantt-t">
            <div className="gantt-b" style={{left:`${left}%`,width:`${w}%`,background:COLORS[pi%COLORS.length]}}>{ph.durationWeeks||4}w</div>

// ── Preview (Whispers format) ──
function buildFinancialLines(d,totals,L){
  // Build client-friendly lump-sum line items (no hourly rates visible)
  const lines=[];
  const pn=(ph)=>ph.customName||t(ph.name,L);

  // Phase totals as lump sums (includes contingency, no rate breakdown)
  (d.phases||[]).forEach((ph,pi)=>{
    if(ph.enabled===false)return;
    const pd=totals.phaseData[pi];
    if(!pd||pd.total===0)return;
    lines.push({desc:pn(ph),total:pd.total});
  });

  // Procurement items
  (d.procOTS||[]).forEach(it=>{
    if(!it.amount)return;
    const h=(it.amount||0)*(it.handlingPct||0);
    lines.push({desc:it.desc||'Materials',total:it.amount+h});
  });
  (d.procCustom||[]).forEach(it=>{
    if(!it.amount)return;
    const h=(it.amount||0)*(it.handlingPct||0);
    const r=(it.amount||0)*(it.riskPct||0);
    lines.push({desc:it.desc||'Custom materials',total:it.amount+h+r});
  });

  // Subcontractors
  (d.subs||[]).forEach(it=>{
    if(!it.amount)return;
    const c=(it.amount||0)*(it.coordPct||COORD_MARGIN);
    lines.push({desc:it.desc||'Subcontractor',total:it.amount+c});
  });

  return lines;
}

          <td style={{textAlign:'right'}}>{fmtE(grand)}</td>
        </tr>
      </tbody>
    </table>

    <h3 style={{marginTop:16}}>{ll.betalingVw}:</h3>
    <div style={{marginBottom:12}}>
      {d.payment.milestones.map((ms,i)=><p key={i} style={{marginBottom:2}}>- {t(ms.name,L)}: {ms.pct}% ({fmtE(grand*ms.pct/100)}){msISOs[i]?`, ${fmtMonth(msISOs[i])}`:''}</p>)}
      <p style={{marginTop:4,color:'#555',fontSize:12}}>- {ll.betalingstermijnTekst.replace('{n}',d.conditions.paymentTerm)}</p>
    </div>

    {/* TERMS & CONDITIONS */}
    <div className="sec-h">{ll.voorwaardenLabel}</div>

    {t(d.project.exclusions,L)&&<>
      <h3>{ll.exclusionsVw}:</h3>
      <p style={{whiteSpace:'pre-wrap',marginBottom:12}}>{t(d.project.exclusions,L)}</p>
    </>}

    <p style={{marginBottom:4}}>- {ll.meerwerkTekst}</p>
    {d.conditions.warrantyEnabled!==false&&<p style={{marginBottom:4}}>- {ll.garantieLabel}: {t(d.conditions.warranty,L)}</p>}
    {(d.conditions.avNL||d.conditions.avEN)&&<p style={{marginBottom:4}}>- {ll.avTekst}</p>}

    {/* APPROVAL */}
    <p style={{marginTop:32,marginBottom:20}}>{ll.akkoordTekst}</p>

    <div style={{marginBottom:8}}>
      <div style={{fontSize:11,textTransform:'uppercase',letterSpacing:.5,color:'#999',marginBottom:4}}>{ll.acceptedBy}:</div>
      <p style={{fontWeight:700}}>{d.client.name||'[Client]'}</p>
    </div>

    {/* Footer */}
    <div className="foot">
      <div><Logo color="#999" h={14}/></div>
      <div>{TEAL.addr} | {TEAL.zip}, Den Haag | KvK {TEAL.kvk} | BTW {TEAL.btw}</div>
    </div>
  </div>;
}

// ── Draw TEAL pixel logo directly in jsPDF ──
function drawLogoInPDF(doc,x,y,scale){
  // TEAL pixel logo: each letter as filled rectangles, plus border frame
  // Grid unit = scale (mm). Letters are 3 wide x 4 tall units. Frame is on the right.
  const s=scale||1.2;
  const c=[17,17,17]; // fill color
  doc.setFillColor(...c);
  // T (3x4 grid at offset 0)
  doc.rect(x,y,3*s,s,'F'); // top bar
  doc.rect(x+s,y+s,s,3*s,'F'); // stem
  // E (3x4 grid at offset 4)
  const ex=x+4*s;
  doc.rect(ex,y,3*s,s,'F'); // top
  doc.rect(ex,y,s,4*s,'F'); // left stem
  doc.rect(ex,y+1.5*s,2*s,s,'F'); // middle
  doc.rect(ex,y+3*s,3*s,s,'F'); // bottom
  // A (3x4 grid at offset 8)
  const ax=x+8*s;
  doc.rect(ax,y,3*s,s,'F'); // top
  doc.rect(ax,y,s,4*s,'F'); // left
  doc.rect(ax+2*s,y,s,4*s,'F'); // right
  doc.rect(ax,y+1.5*s,3*s,s,'F'); // middle
  // L (3x4 grid at offset 12)
  const lx=x+12*s;
  doc.rect(lx,y,s,4*s,'F'); // left stem
  doc.rect(lx,y+3*s,3*s,s,'F'); // bottom bar
  // Frame (rectangle outline, to the right of L)
  const fx=x+16*s,fw=4.5*s,fh=4*s,ft=0.4*s;
  doc.rect(fx,y,fw,fh,'F'); // filled
  doc.setFillColor(255,255,255);
  doc.rect(fx+ft,y+ft,fw-2*ft,fh-2*ft,'F'); // inner cut-out (white)
  doc.setFillColor(...c); // reset
}

// ── PDF ──
function exportPDF(d,setData){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const m=20,pw=170;
  let y=m;
  const NL=d.lang==='nl';
  const L=d.lang;
  const ll=L_(L);
  const totals=calcTotals(d);
  const grand=totals.grandClient;
  const pn=(ph)=>ph.customName||t(ph.name,L);
  const activePhases=d.phases.filter(p=>p.enabled!==false);
  const versionFromRef=(d.ref||'').split('-').pop()||'1';
  const pdfFilename=`TEAL_${NL?'Offerte':'Quotation'}_${(d.project.name||'Draft').replace(/\s+/g,'_')}_v${versionFromRef}.pdf`;

  const addFooter=()=>{
    const pc=doc.getNumberOfPages();
    for(let i=1;i<=pc;i++){
      doc.setPage(i);doc.setFontSize(7);doc.setTextColor(153,153,153);doc.setFont('helvetica','normal');
      doc.text(TEAL.addr+', '+TEAL.zip,m,288);
      doc.text('TEAL | '+TEAL.email,85,288);
      doc.text('KvK '+TEAL.kvk+' | BTW '+TEAL.btw,145,288);
      doc.text(`${i}/${pc}`,190,292,{align:'right'});
    }
  };
  const checkPage=(need=12)=>{if(y>280-need){doc.addPage();y=m}};
  const txt=(text,sz,opts={})=>{
    doc.setFontSize(sz);doc.setFont('helvetica',opts.b?'bold':'normal');
    if(opts.c)doc.setTextColor(...opts.c);else doc.setTextColor(17,17,17);
    checkPage(sz*.5);
    if(opts.w){const lines=doc.splitTextToSize(text||'',opts.w);doc.text(lines,m+(opts.x||0),y);y+=lines.length*sz*.38;}
    else{doc.text(text||'',m+(opts.x||0),y);y+=sz*.42;}
  };
  const line=()=>{doc.setDrawColor(212,236,230);doc.setLineWidth(.5);doc.line(m,y,190,y);y+=4;};
  const gap=(n=3)=>{y+=n};

  const fmtDateLong=ds=>ds?new Date(ds).toLocaleDateString(NL?'nl-NL':'en-GB',{day:'numeric',month:'long',year:'numeric'}):'';
  const finLines=buildFinancialLines(d,totals,L);

  // ── Header with logo ──
  drawLogoInPDF(doc,m,y,1.6);
  y+=9;
  doc.setFontSize(11);doc.setTextColor(85,85,85);doc.setFont('helvetica','normal');
  doc.text(ll.offerte,m,y);y+=8;

  // ── CLIENT ──
  txt(ll.klantLabel,10,{b:true,c:[7,20,18]});gap();
  doc.setFontSize(9);doc.setFont('helvetica','bold');doc.setTextColor(17,17,17);
  doc.text(d.client.name||'[Client]',m,y);y+=5;
  doc.setFont('helvetica','normal');
  if(d.client.contact){doc.text(d.client.contact,m,y);y+=4;}
  if(d.client.email){doc.text(d.client.email,m,y);y+=4;}
  gap(4);

  // ── DETAILS table ──
  txt(ll.detailsLabel,10,{b:true,c:[7,20,18]});gap();
  const detailRows=[[ll.projectnaamPrev,d.project.name||'[Project]']];
  if(d.project.location)detailRows.push([ll.locatie,d.project.location]);
  detailRows.push([ll.referentieLabel,d.ref]);
  detailRows.push([ll.datumPrev,fmtDateLong(d.project.date)]);
  detailRows.push([ll.geldigTot,`${d.conditions.validity||30} ${NL?'dagen':'days'}`]);
  doc.setFontSize(9);
  detailRows.forEach(([lbl,val])=>{
    doc.setFont('helvetica','normal');doc.setTextColor(153,153,153);doc.text(lbl,m,y);
    doc.setTextColor(17,17,17);doc.text(val||'-',m+40,y);y+=5;
  });
  gap(4);line();

  // ── PROJECT DESCRIPTION ──
  if(t(d.project.description,L)||t(d.project.tealRole,L)){
    txt(ll.projectBeschrijving,10,{b:true,c:[7,20,18]});gap();
    if(t(d.project.description,L)){txt(t(d.project.description,L),9,{w:pw});gap(4);}
    if(t(d.project.tealRole,L)){txt(ll.rolTeal,9,{b:true});txt(t(d.project.tealRole,L),9,{w:pw});gap(4);}
    line();
  }

  // ── SCOPE OF WORK & TIMELINE (combined) ──
  txt(ll.scopeTimeline,10,{b:true,c:[7,20,18]});gap();
  activePhases.forEach(ph=>{
    const desc=t(ph.description,L);
    if(desc){checkPage(20);txt(pn(ph),9,{b:true});txt(desc,9,{w:pw});if(ph.effort)txt(`${ll.inzet}: ${ph.effort}`,8,{c:[153,153,153]});gap(3);}
  });

  // Gantt chart (balkenplanning) in PDF
  const phaseDate=(ph)=>{if(!d.project.date||ph.startWeek==null)return'';const dt=new Date(d.project.date);dt.setDate(dt.getDate()+ph.startWeek*7);return fmtDateLong(dt.toISOString().slice(0,10))};
  gap(4);txt(ll.indicatieveTimeline,9,{b:true});gap(4);
  const ganttLeft=m+45,ganttRight=190,ganttW=ganttRight-ganttLeft;
  const totalWeeksGantt=activePhases.reduce((s,ph)=>Math.max(s,(ph.startWeek||0)+(ph.durationWeeks||4)),0)||1;
  const barH=6,barGap=2;
  const hexToRgb=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
  activePhases.forEach((ph,i)=>{
    checkPage(barH+barGap+4);
    const sw=ph.startWeek||0;const dw=ph.durationWeeks||4;
    const barX=ganttLeft+(sw/totalWeeksGantt)*ganttW;
    const barW=Math.max((dw/totalWeeksGantt)*ganttW,8);
    // Phase label
    doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(17,17,17);
    doc.text(pn(ph),m,y+barH-1.5);
    // Bar background track
    doc.setDrawColor(230,230,230);doc.setFillColor(245,245,243);doc.rect(ganttLeft,y,ganttW,barH,'F');
    // Bar
    const clr=hexToRgb(COLORS[i%COLORS.length]);
    doc.setFillColor(...clr);doc.rect(barX,y,barW,barH,'F');
    // Duration text inside bar
    doc.setFontSize(7);doc.setFont('helvetica','bold');doc.setTextColor(7,20,18);
    doc.text(`${dw}w`,barX+2,y+barH-1.5);
    y+=barH+barGap;
  });
  gap(2);line();

  // ── COSTS + PAYMENT ──
  txt(ll.kostenLabel,10,{b:true,c:[7,20,18]});gap(2);
  // Table header (2 columns: description + amount)
  const colItem=m,colTotal=190;
  doc.setFontSize(8);doc.setFont('helvetica','bold');doc.setTextColor(85,85,85);
  doc.text(ll.omschrijvingFinCol,colItem,y);doc.text(ll.bedragCol,colTotal,y,{align:'right'});y+=4;
  doc.setDrawColor(200,200,200);doc.setLineWidth(.3);doc.line(m,y,190,y);y+=4;
  // Table rows
  doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(17,17,17);
  finLines.forEach(ln=>{
    checkPage();
    doc.text(ln.desc||'',colItem,y);
    doc.text(fmtE(ln.total),colTotal,y,{align:'right'});y+=5;
  });
  // Total row
  gap(1);doc.setLineWidth(.5);doc.setDrawColor(17,17,17);doc.line(m,y,190,y);y+=5;
  doc.setFont('helvetica','bold');doc.setFontSize(10);
  doc.text(ll.totaalLabel,colItem,y);doc.text(fmtE(grand),colTotal,y,{align:'right'});y+=6;
  doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(153,153,153);
  doc.text(`${NL?'Reiskosten':'Travel'}: \u20AC ${d.travel?.rateNL||0.50}/km`,m,y);y+=8;

  // Payment sub-section (under costs) - keep together
  const paymentBlockH=8+(d.payment.milestones.length+1)*5+6;
  checkPage(paymentBlockH);
  doc.setTextColor(17,17,17);
  txt(ll.betalingVw+':',9,{b:true});gap(1);
  doc.setFontSize(9);doc.setFont('helvetica','normal');
  // Compute milestone richtdatums (indicative month only)
  const fmtMonth=ds=>ds?new Date(ds).toLocaleDateString(NL?'nl-NL':'en-GB',{month:'long',year:'numeric'}):'';
  const totalWeeks=activePhases.reduce((s,ph)=>Math.max(s,(ph.startWeek||0)+(ph.durationWeeks||4)),0);
  let cumPct=0;
  d.payment.milestones.forEach(ms=>{checkPage();
    cumPct+=ms.pct;
    let monthPart='';
    if(ms.date){monthPart=fmtMonth(ms.date);}
    else if(d.project.date){const weekOff=Math.round(totalWeeks*cumPct/100);const dt=new Date(d.project.date);dt.setDate(dt.getDate()+weekOff*7);monthPart=fmtMonth(dt.toISOString().slice(0,10));}
    const amt=fmtE(grand*ms.pct/100);
    doc.text(`- ${t(ms.name,L)}: ${ms.pct}% (${amt})${monthPart?', '+monthPart:''}`,m,y);y+=5;
  });
  doc.setFontSize(8);doc.setTextColor(100,100,100);
  doc.text('- '+ll.betalingstermijnTekst.replace('{n}',d.conditions.paymentTerm),m,y);y+=6;
  doc.setTextColor(17,17,17);line();

  // ── TERMS & CONDITIONS ── (keep terms + signature together)
  checkPage(60);
  txt(ll.voorwaardenLabel,10,{b:true,c:[7,20,18]});gap();

  // Exclusions sub-section
  if(t(d.project.exclusions,L)){
    txt(ll.exclusionsVw+':',9,{b:true});gap(1);
    doc.setFontSize(9);doc.setFont('helvetica','normal');
    const exLines=doc.splitTextToSize(t(d.project.exclusions,L),pw);
    doc.text(exLines,m,y);y+=exLines.length*4;gap(4);
  }

  // Standard conditions
  doc.setFontSize(9);doc.setFont('helvetica','normal');
  doc.text('- '+ll.meerwerkTekst,m,y);y+=5;
  if(d.conditions.warrantyEnabled!==false){doc.text(`- ${ll.garantieLabel}: ${t(d.conditions.warranty,L)}`,m,y);y+=5;}
  if(d.conditions.avNL||d.conditions.avEN){doc.text('- '+ll.avTekst,m,y);y+=5;}

  // ── ACCEPTED BY ──
  gap(6);checkPage(30);
  doc.setFontSize(9);doc.setFont('helvetica','normal');
  const akLines=doc.splitTextToSize(ll.akkoordTekst,pw);
  doc.text(akLines,m,y);y+=akLines.length*4+6;
  doc.setFontSize(8);doc.setTextColor(153,153,153);doc.text(ll.acceptedBy+':',m,y);y+=5;
  doc.setFontSize(9);doc.setTextColor(17,17,17);doc.setFont('helvetica','bold');
  doc.text(d.client.name||'[Client]',m,y);y+=12;
  doc.setFont('helvetica','normal');doc.setTextColor(153,153,153);doc.setFontSize(8);
  doc.text('____________________________',m,y);y+=4;
  doc.text(NL?'Handtekening':'Signature',m,y);
  doc.text('____________________________',m+80,y-4);
  doc.text(NL?'Datum':'Date',m+80,y);

  addFooter();

  // ── Merge AV PDF if enabled ──
  const shouldAppendAV=d.conditions.avNL||d.conditions.avEN;
  if(shouldAppendAV&&window.PDFLib){
    const quotePdfBytes=doc.output('arraybuffer');
    const avB64=NL?window._AV_NL_B64:window._AV_EN_B64;
    if(avB64){
      (async()=>{
        try{
          const mergedPdf=await PDFLib.PDFDocument.create();
          const quotePdf=await PDFLib.PDFDocument.load(quotePdfBytes);
          const avPdf=await PDFLib.PDFDocument.load(Uint8Array.from(atob(avB64),c=>c.charCodeAt(0)));
          const quotePages=await mergedPdf.copyPages(quotePdf,quotePdf.getPageIndices());
          quotePages.forEach(p=>mergedPdf.addPage(p));
          const avPages=await mergedPdf.copyPages(avPdf,avPdf.getPageIndices());
          avPages.forEach(p=>mergedPdf.addPage(p));
          const mergedBytes=await mergedPdf.save();
          const blob=new Blob([mergedBytes],{type:'application/pdf'});
          const url=URL.createObjectURL(blob);
          const a=document.createElement('a');a.href=url;
          a.download=pdfFilename;
          a.click();URL.revokeObjectURL(url);
        }catch(e){console.error('AV merge failed, exporting without AV:',e);doc.save(pdfFilename);}
      })();
    }else{doc.save(pdfFilename);}
  }else{
    doc.save(pdfFilename);
  }

  // Auto-increment version in ref for next export
  if(setData){
    const parts=d.ref.split('-');
    const curV=parseInt(parts[parts.length-1])||1;
    parts[parts.length-1]=String(curV+1);
    setData({...d,ref:parts.join('-')});
  }
}

            <button className="btn btn-sm btn-g" style={{color:'var(--red)'}} onClick={()=>{if(confirm(`"${item.projectName||'Naamloos'}" verwijderen?`)){onDelete(item.id);refresh();}}}>Verwijderen</button>

function App(){

    const h=loadHash();

  },[]);

    if(newD){const saved=archiveSave(newD,'updated');save(saved);setD(saved);}
    else{setD(null);}
  },[]);

  const openQuote=(data)=>{const saved=archiveSave(data,'updated');save(saved);setD(saved);setTab('project');setShowDash(false);};
  const newQuote=(type)=>{const proj=createProject(type);const saved=archiveSave(proj,'created');save(saved);setD(saved);setTab('project');setShowDash(false);};
  const duplicateQuote=(data)=>{const copy={...JSON.parse(JSON.stringify(data)),_archiveId:undefined};delete copy._archiveId;const ref=data.ref.split('-');ref[ref.length-1]='1';copy.ref=ref.join('-')+'-copy';archiveSave(copy,'created');};
  const deleteQuote=(id)=>{archiveDelete(id);if(d&&d._archiveId===id){setD(null);save(null);}};
  const goToDash=()=>{if(d)archiveSave(d,'updated');setShowDash(true);};

  const handlePdf=()=>{exportPDF(d,setDWithArchive);archiveLogExport(d);};

  const[gSettings,setGSettings]=useState(false);
  const[gExporting,setGExporting]=useState(null);

  const handleGoogleExport=async(type)=>{
    if(type==='settings'){setGSettings(true);return;}
    if(!d){return;}
    if(type==='planning'){window.open(exportToPlanner(d),'_blank');return;}
    if(!getGoogleClientId()){setGSettings(true);return;}
    setGExporting(type);
    try{
      let url;

      else if(type==='docs')url=await exportOfferteToDoc(d);
      if(url)window.open(url,'_blank');
    }catch(e){
      if(e.message==='NO_CLIENT_ID'){setGSettings(true);}
      else{const msg=e?.result?.error?.message||e?.message||JSON.stringify(e);alert('Google export mislukt: '+msg);console.error('Export error:',e);}
    }finally{setGExporting(null);}
  };

  const ll=d?L_(d.lang):I.nl;
  const tabs=[
    {id:'project',label:ll.tabProject},{id:'scope',label:ll.tabScope},
    {id:'budget',label:ll.tabBudget},{id:'planning',label:ll.tabPlanning},
    {id:'payment',label:ll.tabPayment},{id:'preview',label:ll.tabPreview},
  ];

  return <div className="app">
    <GoogleSettingsModal open={gSettings} onClose={()=>setGSettings(false)}/>
    {gExporting&&<div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,.4)',zIndex:900,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div className="card" style={{margin:0,textAlign:'center',padding:32}}>
        <div style={{fontSize:24,marginBottom:12,animation:'spin 1s linear infinite'}}>&#8635;</div>
        <p style={{fontWeight:600}}>{gExporting==='sheets'?'Budget exporteren naar Google Sheets...':'Offerte exporteren naar Google Docs...'}</p>
      </div>
    </div>}
    <Header data={showDash?null:d} onPdf={handlePdf} onGoogleExport={handleGoogleExport} setData={setDWithArchive}/>
    {!showDash&&d&&<TabNav tabs={tabs} active={tab} onChange={setTab}/>}
    <div className="main">
      {showDash?<Dashboard onOpen={openQuote} onNew={newQuote} onDuplicate={duplicateQuote} onDelete={deleteQuote}/>:
      !d?<Start onSelect={type=>{if(type==='load'){const r=load();if(r)openQuote(r);}else newQuote(type);}}/>:<>
        <div className="between mb16">
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <button className="btn btn-sm btn-g" onClick={goToDash} title="Terug naar overzicht" style={{padding:'4px 8px',fontSize:14}}>←</button>
            <span style={{fontSize:11,fontWeight:700,letterSpacing:1,textTransform:'uppercase',color:'#555'}}>{d.type} {d.lang==='nl'?'offerte':'quotation'}</span>
            {d.project.name&&<span style={{color:'#999'}}>{d.project.name}</span>}
            <span style={{fontSize:11,color:'#999'}}>{d.ref}</span>
          </div>
          <button className="btn btn-sm btn-g" onClick={()=>{newQuote(d.type)}}>{ll.nieuw}</button>
        </div>
        {tab==='project'&&<ProjectTab data={d} set={setDWithArchive}/>}
        {tab==='scope'&&<ScopeTab data={d} set={setDWithArchive}/>}
        {tab==='budget'&&<BudgetTab data={d} set={setDWithArchive}/>}
        {tab==='planning'&&<PlanningTab data={d} set={setDWithArchive}/>}
        {tab==='payment'&&<PaymentTab data={d} set={setDWithArchive}/>}
        {tab==='preview'&&<PreviewTab data={d}/>}
      </>}
    </div>
  </div>;
}
