// ── Totals helper ──
function calcTotals(d){
  // Block A: TEAL fees
  const phaseData=d.phases.map(p=>{
    const client=p.items.reduce((s,it)=>s+(it.qty||0)*(it.extRate||0),0);
    const cost=p.items.reduce((s,it)=>s+(it.qty||0)*(it.intRate||0),0);
    const cont=client*(p.contingency||0);
    return{client,cost,cont,total:client+cont};
  });
  const blockAClient=phaseData.reduce((s,p)=>s+p.total,0);
  const blockACost=phaseData.reduce((s,p)=>s+p.cost,0);

  // Block B1: Off-the-shelf
  let b1Purchase=0,b1Handling=0;
  (d.procOTS||[]).forEach(it=>{
    const v=it.amount||0;
    b1Purchase+=v;
    b1Handling+=v*(it.handlingPct!=null?it.handlingPct:getHandlingPct(v));
  });

  // Block B2: Custom
  let b2Purchase=0,b2Handling=0,b2Risk=0;
  (d.procCustom||[]).forEach(it=>{
    const v=it.amount||0;
    b2Purchase+=v;
    b2Handling+=v*(it.handlingPct!=null?it.handlingPct:getHandlingPct(v));
    b2Risk+=v*(it.riskPct||0);
  });

  // Block C: Subcontractors
  let subFees=0,subCoord=0;
  (d.subs||[]).forEach(it=>{
    const v=it.amount||0;
    subFees+=v;
    subCoord+=v*(it.coordPct!=null?it.coordPct:COORD_MARGIN);
  });

  const procClient=b1Purchase+b1Handling+b2Purchase+b2Handling+b2Risk;
  const procCost=b1Purchase+b2Purchase;
  const subClient=subFees+subCoord;

  const grandClient=blockAClient+procClient+subClient;
  const grandCost=blockACost+procCost+subFees;
  const margin=grandClient>0?(grandClient-grandCost)/grandClient:0;

  return{phaseData,blockAClient,blockACost,b1Purchase,b1Handling,b2Purchase,b2Handling,b2Risk,
    procClient,procCost,subFees,subCoord,subClient,grandClient,grandCost,margin};
}

      {d&&<button className="btn btn-s" onClick={onPdf}>PDF</button>}
    </div>
  </div>;
}

// ── Budget Tab ──
function BudgetTab({data:d,set}){
  const L=d.lang;
  const totals=calcTotals(d);

  const upItem=(pi,ii,k,v)=>{const p=[...d.phases];const items=[...p[pi].items];items[ii]={...items[ii],[k]:v};p[pi]={...p[pi],items};set({...d,phases:p})};
  const addItem=pi=>{const p=[...d.phases];p[pi]={...p[pi],items:[...p[pi].items,{id:uid(),role:'design',desc:{nl:'',en:''},qty:0,extRate:120,intRate:75,unit:'uur'}]};set({...d,phases:p})};
  const rmItem=(pi,ii)=>{const p=[...d.phases];p[pi]={...p[pi],items:p[pi].items.filter((_,i)=>i!==ii)};set({...d,phases:p})};
  const upCont=(pi,v)=>{const p=[...d.phases];p[pi]={...p[pi],contingency:v};set({...d,phases:p})};

  const changeRole=(pi,ii,roleId)=>{
    const r=roleMap[roleId];
    if(!r)return;
    upItem(pi,ii,'role',roleId);
    upItem(pi,ii,'extRate',r.ext);
    upItem(pi,ii,'intRate',r.int);
    upItem(pi,ii,'unit',r.unit);
  };

  // Procurement helpers
  const upOTS=(i,k,v)=>{const a=[...(d.procOTS||[])];a[i]={...a[i],[k]:v};if(k==='amount')a[i].handlingPct=getHandlingPct(v);set({...d,procOTS:a})};
  const addOTS=()=>set({...d,procOTS:[...(d.procOTS||[]),{id:uid(),desc:'',supplier:'',amount:0,handlingPct:.20}]});
  const rmOTS=i=>set({...d,procOTS:(d.procOTS||[]).filter((_,idx)=>idx!==i)});

  const upCust=(i,k,v)=>{const a=[...(d.procCustom||[])];a[i]={...a[i],[k]:v};if(k==='amount')a[i].handlingPct=getHandlingPct(v);set({...d,procCustom:a})};
  const addCust=()=>set({...d,procCustom:[...(d.procCustom||[]),{id:uid(),desc:'',supplier:'',amount:0,handlingPct:.12,riskPct:.10}]});
  const rmCust=i=>set({...d,procCustom:(d.procCustom||[]).filter((_,idx)=>idx!==i)});

  const upSub=(i,k,v)=>{const a=[...(d.subs||[])];a[i]={...a[i],[k]:v};set({...d,subs:a})};
  const addSub=()=>set({...d,subs:[...(d.subs||[]),{id:uid(),desc:'',company:'',amount:0,coordPct:COORD_MARGIN}]});
  const rmSub=i=>set({...d,subs:(d.subs||[]).filter((_,idx)=>idx!==i)});

  return <>
    {/* Block A */}
    <div className="card">
      <div className="card-h">Block A: TEAL Fees (uren x tarief)</div>
      <p className="sm muted mb16">Klantprijs = uren x extern tarief. Kostprijs = uren x intern tarief. Marge = verschil.</p>
      <table className="bt">
        <thead><tr><th style={{width:'20%'}}>Omschrijving</th><th style={{width:'12%'}}>Rol</th><th style={{width:'7%'}}>Aantal</th><th style={{width:'7%'}}>Eenh.</th><th style={{width:'9%'}}>Ext. tarief</th><th style={{width:'10%'}}>Klantprijs</th><th style={{width:'9%'}}>Int. tarief</th><th style={{width:'10%'}}>Kostprijs</th><th style={{width:'10%'}}>Marge</th><th style={{width:'4%'}}></th></tr></thead>
        <tbody>
          {d.phases.map((ph,pi)=><React.Fragment key={ph.id}>
            <tr className="ph"><td colSpan={9}>{ph.code} - {t(ph.name,L)}
              <span style={{opacity:.6,marginLeft:12,fontSize:11}}>contingency: <input type="number" value={Math.round((ph.contingency||0)*100)} onChange={e=>upCont(pi,(parseInt(e.target.value)||0)/100)} style={{width:40,textAlign:'center',background:'rgba(255,255,255,.15)',border:'1px solid rgba(255,255,255,.2)',borderRadius:3,color:'var(--teal-mint)',fontSize:11,padding:'2px 4px'}}/>%</span>
            </td><td style={{textAlign:'right'}}><button className="btn btn-sm" style={{background:'rgba(212,236,230,.15)',color:'var(--teal-mint)',border:0}} onClick={()=>addItem(pi)}>+</button></td></tr>
            {ph.items.map((it,ii)=>{
              const cp=(it.qty||0)*(it.extRate||0);
              const ip=(it.qty||0)*(it.intRate||0);
              return <tr key={it.id}>
                <td><input value={t(it.desc,L)} onChange={e=>{const o=it.desc;const n=typeof o==='string'?{nl:o,en:o}:{...o};n[L]=e.target.value;upItem(pi,ii,'desc',n)}}/></td>
                <td><select value={it.role} onChange={e=>changeRole(pi,ii,e.target.value)}>
                  {ROLES.map(r=><option key={r.id} value={r.id}>{t(r.name,L)}</option>)}</select></td>
                <td><input type="number" value={it.qty||''} onChange={e=>upItem(pi,ii,'qty',parseFloat(e.target.value)||0)}/></td>
                <td className="sm muted">{it.unit}</td>
                <td><input type="number" value={it.extRate||''} onChange={e=>upItem(pi,ii,'extRate',parseFloat(e.target.value)||0)}/></td>
                <td className="tr mono">{fmt(cp)}</td>
                <td><input type="number" value={it.intRate||''} onChange={e=>upItem(pi,ii,'intRate',parseFloat(e.target.value)||0)}/></td>
                <td className="tr mono">{fmt(ip)}</td>
                <td className="tr mono" style={{color:cp-ip>=0?'var(--green)':'var(--red)'}}>{fmt(cp-ip)}</td>
                <td className="tr"><button className="btn btn-sm btn-g" onClick={()=>rmItem(pi,ii)}>&times;</button></td>
              </tr>})}
            <tr className="sub"><td colSpan={5}>Subtotaal {ph.code}</td>
              <td className="tr mono">{fmt(totals.phaseData[pi]?.client||0)}</td><td></td>
              <td className="tr mono">{fmt(totals.phaseData[pi]?.cost||0)}</td>
              <td className="tr mono">{fmt((totals.phaseData[pi]?.client||0)-(totals.phaseData[pi]?.cost||0))}</td><td></td></tr>
            {(ph.contingency||0)>0&&<tr className="sub"><td colSpan={5} className="sm">Contingency {Math.round((ph.contingency||0)*100)}%</td>
              <td className="tr mono sm">{fmt(totals.phaseData[pi]?.cont||0)}</td><td colSpan={4}></td></tr>}
          </React.Fragment>)}
          <tr className="tot"><td colSpan={5}>Totaal Block A</td>
            <td className="tr mono">{fmtE(totals.blockAClient)}</td><td></td>
            <td className="tr mono">{fmtE(totals.blockACost)}</td>
            <td className="tr mono">{fmtE(totals.blockAClient-totals.blockACost)}</td><td></td></tr>
        </tbody>
      </table>
    </div>

    {/* Block B1: Off-the-shelf */}
    <div className="card">
      <div className="card-h">Block B1: Inkoop (off-the-shelf)</div>
      <p className="sm muted mb16">Standaard catalogusartikelen. Handling fee automatisch op basis van inkoopwaarde.</p>
      <table className="bt">
        <thead><tr><th>Item</th><th style={{width:'14%'}}>Leverancier</th><th style={{width:'12%'}}>Inkoopwaarde</th><th style={{width:'8%'}}>Hand. %</th><th style={{width:'12%'}}>Handling fee</th><th style={{width:'12%'}}>Klantprijs</th><th style={{width:'4%'}}></th></tr></thead>
        <tbody>
          {(d.procOTS||[]).map((it,i)=>{
            const h=(it.amount||0)*(it.handlingPct||0);
            return <tr key={it.id||i}>
              <td><input value={it.desc||''} onChange={e=>upOTS(i,'desc',e.target.value)}/></td>
              <td><input value={it.supplier||''} onChange={e=>upOTS(i,'supplier',e.target.value)}/></td>
              <td><input type="number" value={it.amount||''} onChange={e=>upOTS(i,'amount',parseFloat(e.target.value)||0)}/></td>
              <td className="tr mono">{Math.round((it.handlingPct||0)*100)}%</td>
              <td className="tr mono">{fmt(h)}</td>
              <td className="tr mono">{fmt((it.amount||0)+h)}</td>
              <td><button className="btn btn-sm btn-g" onClick={()=>rmOTS(i)}>&times;</button></td>
            </tr>})}
          <tr className="sub"><td colSpan={2}>Subtotaal B1</td><td className="tr mono">{fmt(totals.b1Purchase)}</td><td></td><td className="tr mono">{fmt(totals.b1Handling)}</td><td className="tr mono">{fmt(totals.b1Purchase+totals.b1Handling)}</td><td></td></tr>
        </tbody>
      </table>
      <button className="btn btn-sm btn-g mt16" onClick={addOTS}>+ Inkooppost</button>
    </div>

    {/* Block B2: Custom */}
    <div className="card">
      <div className="card-h">Block B2: Inkoop (maatwerk)</div>
      <p className="sm muted mb16">TEAL schrijft de spec, TEAL draagt het risico. Handling fee + risk buffer per regel.</p>
      <table className="bt">
        <thead><tr><th>Item</th><th style={{width:'12%'}}>Leverancier</th><th style={{width:'10%'}}>Inkoopwaarde</th><th style={{width:'7%'}}>Hand. %</th><th style={{width:'9%'}}>Hand. fee</th><th style={{width:'7%'}}>Risk %</th><th style={{width:'9%'}}>Risk buffer</th><th style={{width:'10%'}}>Klantprijs</th><th style={{width:'4%'}}></th></tr></thead>
        <tbody>
          {(d.procCustom||[]).map((it,i)=>{
            const h=(it.amount||0)*(it.handlingPct||0);
            const r=(it.amount||0)*(it.riskPct||0);
            return <tr key={it.id||i}>
              <td><input value={it.desc||''} onChange={e=>upCust(i,'desc',e.target.value)}/></td>
              <td><input value={it.supplier||''} onChange={e=>upCust(i,'supplier',e.target.value)}/></td>
              <td><input type="number" value={it.amount||''} onChange={e=>upCust(i,'amount',parseFloat(e.target.value)||0)}/></td>
              <td className="tr mono">{Math.round((it.handlingPct||0)*100)}%</td>
              <td className="tr mono">{fmt(h)}</td>
              <td><input type="number" value={Math.round((it.riskPct||0)*100)} onChange={e=>upCust(i,'riskPct',(parseInt(e.target.value)||0)/100)} style={{width:50}}/></td>
              <td className="tr mono">{fmt(r)}</td>
              <td className="tr mono">{fmt((it.amount||0)+h+r)}</td>
              <td><button className="btn btn-sm btn-g" onClick={()=>rmCust(i)}>&times;</button></td>
            </tr>})}
          <tr className="sub"><td colSpan={2}>Subtotaal B2</td><td className="tr mono">{fmt(totals.b2Purchase)}</td><td></td><td className="tr mono">{fmt(totals.b2Handling)}</td><td></td><td className="tr mono">{fmt(totals.b2Risk)}</td><td className="tr mono">{fmt(totals.b2Purchase+totals.b2Handling+totals.b2Risk)}</td><td></td></tr>
        </tbody>
      </table>
      <button className="btn btn-sm btn-g mt16" onClick={addCust}>+ Maatwerk inkooppost</button>
    </div>

    {/* Block C: Subcontractors */}
    <div className="card">
      <div className="card-h">Block C: Onderaannemers (12% coordinatiemarge)</div>
      <table className="bt">
        <thead><tr><th>Omschrijving</th><th style={{width:'14%'}}>Onderaannemer</th><th style={{width:'12%'}}>Bedrag</th><th style={{width:'8%'}}>Coord. %</th><th style={{width:'12%'}}>Coord. fee</th><th style={{width:'12%'}}>Klantprijs</th><th style={{width:'4%'}}></th></tr></thead>
        <tbody>
          {(d.subs||[]).map((it,i)=>{
            const c=(it.amount||0)*(it.coordPct||COORD_MARGIN);
            return <tr key={it.id||i}>
              <td><input value={it.desc||''} onChange={e=>upSub(i,'desc',e.target.value)}/></td>
              <td><input value={it.company||''} onChange={e=>upSub(i,'company',e.target.value)}/></td>
              <td><input type="number" value={it.amount||''} onChange={e=>upSub(i,'amount',parseFloat(e.target.value)||0)}/></td>
              <td className="tr mono">{Math.round((it.coordPct||COORD_MARGIN)*100)}%</td>
              <td className="tr mono">{fmt(c)}</td>
              <td className="tr mono">{fmt((it.amount||0)+c)}</td>
              <td><button className="btn btn-sm btn-g" onClick={()=>rmSub(i)}>&times;</button></td>
            </tr>})}
          <tr className="sub"><td colSpan={2}>Subtotaal C</td><td className="tr mono">{fmt(totals.subFees)}</td><td></td><td className="tr mono">{fmt(totals.subCoord)}</td><td className="tr mono">{fmt(totals.subClient)}</td><td></td></tr>
        </tbody>
      </table>
      <button className="btn btn-sm btn-g mt16" onClick={addSub}>+ Onderaannemer</button>
    </div>

    {/* Totals + Margin */}
    <div className="card">
      <div className="card-h">Totaaloverzicht</div>
      <table className="bt">
        <tbody>
          <tr><td>Block A: TEAL Fees</td><td className="tr mono">{fmtE(totals.blockAClient)}</td><td className="tr mono muted">(kost: {fmtE(totals.blockACost)})</td></tr>
          <tr><td>Block B: Inkoop (incl. handling + risk)</td><td className="tr mono">{fmtE(totals.procClient)}</td><td className="tr mono muted">(kost: {fmtE(totals.procCost)})</td></tr>
          <tr><td>Block C: Onderaannemers (incl. coord.)</td><td className="tr mono">{fmtE(totals.subClient)}</td><td className="tr mono muted">(kost: {fmtE(totals.subFees)})</td></tr>
          <tr className="tot"><td>Totaal excl. BTW</td><td className="tr mono">{fmtE(totals.grandClient)}</td><td className="tr mono" style={{color:'var(--teal-mint)'}}>(marge: {fmtE(totals.grandClient-totals.grandCost)})</td></tr>
        </tbody>
      </table>
      <div className={`mbar ${marginStatus(totals.margin)}`}>
        <span>Marge: {Math.round(totals.margin*100)}%</span>
        <span style={{fontSize:12,fontWeight:400}}>Target: 25-35%</span>
      </div>
    </div>
  </>;
}

// ── Planning Tab ──
function PlanningTab({data:d,set}){
  const total=Math.max(16,...d.phases.map(p=>(p.startWeek||0)+(p.durationWeeks||4)));
  const upPh=(i,k,v)=>{const p=[...d.phases];p[i]={...p[i],[k]:v};set({...d,phases:p})};
  return <div className="card">
    <div className="card-h">Planning (indicatief)</div>
    <div style={{overflowX:'auto'}}>
      {d.phases.map((ph,pi)=>{
        const left=((ph.startWeek||0)/total)*100;
        const w=((ph.durationWeeks||4)/total)*100;
        return <div key={ph.id} className="gantt-r">
          <div className="gantt-l">{ph.code} - {t(ph.name,d.lang)}</div>
          <div className="gantt-t">
            <div className="gantt-b" style={{left:`${left}%`,width:`${w}%`,background:COLORS[pi%COLORS.length]}}>{ph.durationWeeks||4}w</div>
          </div>
        </div>;
      })}
    </div>
    <table className="bt mt24">
      <thead><tr><th>Fase</th><th style={{width:'12%'}}>Start (week)</th><th style={{width:'12%'}}>Duur (weken)</th><th style={{width:'20%'}}>Startdatum</th></tr></thead>
      <tbody>{d.phases.map((ph,pi)=>{
        let sd='';
        if(d.project.date&&ph.startWeek>=0){const dt=new Date(d.project.date);dt.setDate(dt.getDate()+(ph.startWeek||0)*7);sd=dt.toLocaleDateString('nl-NL',{day:'numeric',month:'short',year:'numeric'})}
        return <tr key={ph.id}>
          <td>{ph.code} - {t(ph.name,d.lang)}</td>
          <td><input type="number" min={0} value={ph.startWeek||0} onChange={e=>upPh(pi,'startWeek',parseInt(e.target.value)||0)}/></td>
          <td><input type="number" min={1} value={ph.durationWeeks||4} onChange={e=>upPh(pi,'durationWeeks',parseInt(e.target.value)||1)}/></td>
          <td className="muted">{sd}</td>
        </tr>;
      })}</tbody>
    </table>
  </div>;
}

// ── Payment Tab ──
function PaymentTab({data:d,set}){
  const totals=calcTotals(d);
  const grand=totals.grandClient;
  const upMs=(i,k,v)=>{const ms=[...d.payment.milestones];ms[i]={...ms[i],[k]:v};set({...d,payment:{...d.payment,milestones:ms}})};
  const totPct=d.payment.milestones.reduce((s,m)=>s+(m.pct||0),0);

  return <div className="card">
    <div className="card-h">Betalingsschema</div>
    <table className="bt">
      <thead><tr><th>Mijlpaal</th><th style={{width:'10%'}}>%</th><th style={{width:'18%'}}>Bedrag</th><th style={{width:'18%'}}>Datum</th><th style={{width:'6%'}}></th></tr></thead>
      <tbody>
        {d.payment.milestones.map((ms,i)=><tr key={i}>
          <td><input value={t(ms.name,d.lang)} onChange={e=>{const o=ms.name;const n=typeof o==='string'?{nl:o,en:o}:{...o};n[d.lang]=e.target.value;upMs(i,'name',n)}}/></td>
          <td><input type="number" value={ms.pct||''} onChange={e=>upMs(i,'pct',parseInt(e.target.value)||0)}/></td>
          <td className="mono">{fmtE(grand*(ms.pct||0)/100)}</td>
          <td><input type="date" value={ms.date||''} onChange={e=>upMs(i,'date',e.target.value)}/></td>
          <td><button className="btn btn-sm btn-g" onClick={()=>{const mss=d.payment.milestones.filter((_,idx)=>idx!==i);set({...d,payment:{...d.payment,milestones:mss}})}}>&times;</button></td>
        </tr>)}
        <tr className="sub"><td>Totaal</td><td style={{color:totPct===100?'var(--green)':'var(--red)',fontWeight:600}}>{totPct}%</td><td className="mono">{fmtE(grand)}</td><td></td><td></td></tr>
      </tbody>
    </table>
    <button className="btn btn-sm btn-g mt16" onClick={()=>{const ms=[...d.payment.milestones,{name:{nl:'',en:''},pct:0,date:''}];set({...d,payment:{...d.payment,milestones:ms}})}}>+ Mijlpaal</button>

    <div className="mt24"><div className="card-h">Voorwaarden</div>
      <div className="row row3">
        <div className="fg"><label>Geldigheid (dagen)</label><input type="number" value={d.conditions.validity} onChange={e=>set({...d,conditions:{...d.conditions,validity:parseInt(e.target.value)||30}})}/></div>
        <div className="fg"><label>Betalingstermijn (dagen)</label><input type="number" value={d.conditions.paymentTerm} onChange={e=>set({...d,conditions:{...d.conditions,paymentTerm:parseInt(e.target.value)||14}})}/></div>
        <div className="fg"><label>Garantie</label><input value={t(d.conditions.warranty,d.lang)} onChange={e=>{const o=d.conditions.warranty;const n=typeof o==='string'?{nl:o,en:o}:{...o};n[d.lang]=e.target.value;set({...d,conditions:{...d.conditions,warranty:n}})}}/></div>
      </div>
      <div className="row mt16">
        <label style={{display:'flex',alignItems:'center',gap:8,fontSize:13,cursor:'pointer'}}>
          <input type="checkbox" checked={d.conditions.avNL!==false} onChange={e=>set({...d,conditions:{...d.conditions,avNL:e.target.checked}})}/> Algemene Voorwaarden TEAL bijvoegen (NL)
        </label>
        <label style={{display:'flex',alignItems:'center',gap:8,fontSize:13,cursor:'pointer'}}>
          <input type="checkbox" checked={d.conditions.avEN===true} onChange={e=>set({...d,conditions:{...d.conditions,avEN:e.target.checked}})}/> General Terms & Conditions (EN)
        </label>
      </div>
    </div>
  </div>;
}

// ── Preview ──
function PreviewTab({data:d}){
  const L=d.lang;
  const NL=L==='nl';
  const totals=calcTotals(d);
  const grand=totals.grandClient;

  const fmtDate=ds=>ds?new Date(ds).toLocaleDateString(NL?'nl-NL':'en-GB',{day:'numeric',month:'long',year:'numeric'}):'';
  const fmtDateShort=ds=>{if(!ds)return'';const dt=new Date(ds);return`${dt.getDate()}.${dt.getMonth()+1}.${dt.getFullYear()}`};
  let sec=0;

  return <div className="prev" id="offerte-preview">
    {/* Header: type + date, like Change Order */}
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:36}}>
      <div style={{fontSize:14,fontWeight:600,textTransform:'uppercase',letterSpacing:1}}>{NL?'OFFERTE':'QUOTATION'}</div>
      <div style={{fontSize:13}}>{fmtDateShort(d.project.date)}</div>
    </div>

    {/* Section 1: Project Details (table with grey labels) */}
    <div className="sec-h">{++sec} - {NL?'Projectgegevens':'Project Details'}</div>
    <table>
      <tbody>
        <tr><td className="label-cell">Project</td><td>{d.project.name||'[Projectnaam]'}</td><td className="label-cell">{NL?'Referentie':'Reference'}</td><td>{d.ref}</td></tr>
        <tr><td className="label-cell">{NL?'Klant':'Client'}</td><td>{d.client.name||'[Klant]'}{d.client.contact?`, ${d.client.contact}`:''}</td><td className="label-cell">Versie</td><td>{d.project.version}</td></tr>
        <tr><td className="label-cell">{NL?'Geldigheid':'Validity'}</td><td>{d.conditions.validity} {NL?'dagen na dagtekening':'days'}</td><td className="label-cell">{NL?'Betaling':'Payment'}</td><td>{d.conditions.paymentTerm} {NL?'dagen':'days'}</td></tr>
      </tbody>
    </table>

    {/* Section 2: Description */}
    {(t(d.project.description,L)||t(d.project.tealRole,L))&&<>
      <div className="sec-h">{++sec} - {NL?'Projectomschrijving':'Project Description'}</div>
      {t(d.project.description,L)&&<p style={{whiteSpace:'pre-wrap',marginBottom:12}}>{t(d.project.description,L)}</p>}
      {t(d.project.tealRole,L)&&<><h3>{NL?'Rol van TEAL':"TEAL's Role"}</h3><p style={{whiteSpace:'pre-wrap',marginBottom:12}}>{t(d.project.tealRole,L)}</p></>}
      {t(d.project.exclusions,L)&&<><h3>{NL?'Niet inbegrepen':'Exclusions'}</h3><p style={{whiteSpace:'pre-wrap'}}>{t(d.project.exclusions,L)}</p></>}
    </>}

    {/* Section 3: Scope */}
    <div className="sec-h">{++sec} - {NL?'Scope en aanpak':'Scope of Work'}</div>
    {d.phases.map(ph=>{
      const desc=t(ph.description,L);
      return desc?<div key={ph.id} style={{marginBottom:14}}>
        <h3>{ph.code} - {t(ph.name,L)}</h3>
        <p style={{whiteSpace:'pre-wrap'}}>{desc}</p>
        {ph.effort&&<p style={{marginTop:4,color:'#999',fontSize:12}}><strong>{NL?'Inzet':'Effort'}:</strong> {ph.effort}</p>}
      </div>:null;
    })}

    {/* Section 4: Investment */}
    <div className="sec-h">{++sec} - {NL?'Investering':'Investment'}</div>
    <table>
      <thead><tr><th>{NL?'Fase':'Phase'}</th><th>{NL?'Omschrijving':'Description'}</th><th style={{textAlign:'right'}}>{NL?'Bedrag excl. BTW':'Amount ex. VAT (\u20AC)'}</th></tr></thead>
      <tbody>
        {d.phases.map((ph,pi)=>{
          const pd=totals.phaseData[pi];
          if(!pd||pd.total===0)return null;
          return <tr key={ph.id}>
            <td style={{fontWeight:600}}>{ph.code}</td>
            <td>{t(ph.name,L)}{pd.cont>0?` (incl. ${Math.round((ph.contingency||0)*100)}% contingency)`:''}</td>
            <td style={{textAlign:'right',fontFamily:'monospace'}}>{fmtE(pd.total)}</td>
          </tr>;
        })}
        {totals.procClient>0&&<tr>
          <td style={{fontWeight:600}}>B</td>
          <td>{NL?'Materialen en inkoop':'Materials and procurement'}</td>
          <td style={{textAlign:'right',fontFamily:'monospace'}}>{fmtE(totals.procClient)}</td>
        </tr>}
        {totals.subClient>0&&<tr>
          <td style={{fontWeight:600}}>C</td>
          <td>{NL?'Onderaanneming':'Subcontractors'}</td>
          <td style={{textAlign:'right',fontFamily:'monospace'}}>{fmtE(totals.subClient)}</td>
        </tr>}
        <tr style={{fontWeight:700,background:'#f0f0ee'}}>
          <td colSpan={2} style={{textDecoration:'underline'}}>{NL?'TOTAAL':'TOTAL'}</td>
          <td style={{textAlign:'right',fontFamily:'monospace',textDecoration:'underline'}}>{fmtE(grand)}</td>
        </tr>
      </tbody>
    </table>
    <p style={{marginTop:8,fontSize:11,color:'#999',fontStyle:'italic'}}>{NL?'Prijzen exclusief BTW.':'Prices exclude VAT.'} {NL?`Reiskosten: \u20AC ${d.travel?.rateNL||0.50}/km.`:`Travel: \u20AC ${d.travel?.rateNL||0.50}/km.`}</p>

    {/* Section 5: Planning */}
    <div className="sec-h">{++sec} - {NL?'Planning':'Planning'}</div>
    <table>
      <thead><tr><th>{NL?'Fase':'Phase'}</th><th>{NL?'Omschrijving':'Description'}</th><th>{NL?'Duur':'Duration'}</th><th>{NL?'Indicatieve start':'Indicative start'}</th></tr></thead>
      <tbody>
        {d.phases.map(ph=>{
          let sd='';
          if(d.project.date&&ph.startWeek>=0){const dt=new Date(d.project.date);dt.setDate(dt.getDate()+(ph.startWeek||0)*7);sd=dt.toLocaleDateString(NL?'nl-NL':'en-GB',{day:'numeric',month:'short',year:'numeric'})}
          return <tr key={ph.id}>
            <td style={{fontWeight:600}}>{ph.code}</td>
            <td>{t(ph.name,L)}</td>
            <td>{ph.durationWeeks||4} {NL?'weken':'weeks'}</td>
            <td>{sd}</td>
          </tr>;
        })}
      </tbody>
    </table>

    {/* Section 6: Payment */}
    <div className="sec-h">{++sec} - {NL?'Betalingsschema':'Payment Schedule'}</div>
    <table>
      <thead><tr><th>{NL?'Mijlpaal':'Milestone'}</th><th style={{textAlign:'right'}}>%</th><th style={{textAlign:'right'}}>{NL?'Bedrag excl. BTW':'Amount ex. VAT (\u20AC)'}</th></tr></thead>
      <tbody>
        {d.payment.milestones.map((ms,i)=><tr key={i}>
          <td>{t(ms.name,L)}</td>
          <td style={{textAlign:'right'}}>{ms.pct}%</td>
          <td style={{textAlign:'right',fontFamily:'monospace'}}>{fmtE(grand*ms.pct/100)}</td>
        </tr>)}
        <tr style={{fontWeight:700,background:'#f0f0ee'}}>
          <td style={{textDecoration:'underline'}}>{NL?'TOTAAL':'TOTAL'}</td>
          <td style={{textAlign:'right'}}>{d.payment.milestones.reduce((s,m)=>s+(m.pct||0),0)}%</td>
          <td style={{textAlign:'right',fontFamily:'monospace',textDecoration:'underline'}}>{fmtE(grand)}</td>
        </tr>
      </tbody>
    </table>
    <p style={{marginTop:8,fontSize:11,color:'#999',fontStyle:'italic'}}>{NL?`Betalingstermijn: ${d.conditions.paymentTerm} dagen na factuurdatum.`:`Payment due within ${d.conditions.paymentTerm} days of invoice date.`}</p>

    {/* Section 7: Conditions */}
    <div className="sec-h">{++sec} - {NL?'Voorwaarden':'Terms & Conditions'}</div>
    <table>
      <tbody>
        <tr><td className="label-cell">{NL?'Geldigheid':'Validity'}</td><td>{NL?`${d.conditions.validity} dagen na dagtekening`:`${d.conditions.validity} days from date of issue`}</td></tr>
        <tr><td className="label-cell">{NL?'Garantie':'Warranty'}</td><td>{t(d.conditions.warranty,L)}</td></tr>
        <tr><td className="label-cell">BTW</td><td>{NL?'Alle genoemde prijzen zijn exclusief BTW':'All prices exclude VAT'}</td></tr>
        {(d.conditions.avNL||d.conditions.avEN)&&<tr><td className="label-cell">{NL?'Algemene Voorwaarden':'General Terms'}</td><td>{NL?'De Algemene Voorwaarden van TEAL B.V. zijn van toepassing (bijgevoegd).':'The General Terms and Conditions of TEAL B.V. apply (attached).'}</td></tr>}
      </tbody>
    </table>

    {/* Section 8: Approval */}
    <div className="sec-h">{++sec} - {NL?'Akkoord':'Approval'}</div>
    <p style={{marginBottom:20}}>{NL?'Ondergetekende verklaart akkoord te gaan met de voorwaarden en werkzaamheden zoals beschreven in deze offerte.':'By signing below, the client confirms this quotation and authorizes TEAL to proceed.'}</p>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:32}}>
      <div>
        <div style={{fontSize:11,textTransform:'uppercase',letterSpacing:.5,color:'#999',marginBottom:4}}>CLIENT</div>
        <p style={{fontWeight:600}}>{d.client.name||'[Klant]'}</p>
        <div style={{marginTop:32,borderBottom:'1px solid #999',width:'80%'}}></div>
        <p style={{fontSize:11,color:'#999',marginTop:4}}>{NL?'Naam en handtekening':'Name and signature'}</p>
        <div style={{marginTop:20,borderBottom:'1px solid #999',width:'50%'}}></div>
        <p style={{fontSize:11,color:'#999',marginTop:4}}>{NL?'Datum':'Date'}</p>
      </div>
      <div>
        <div style={{fontSize:11,textTransform:'uppercase',letterSpacing:.5,color:'#999',marginBottom:4}}>TEAL B.V.</div>
        <p style={{fontWeight:600}}>Erik Swaagstra</p>
      </div>
    </div>

    {/* Footer: logo left, page info right */}
    <div className="foot">
      <Logo color="#111" h={16}/>
      <div>{TEAL.addr}, {TEAL.zip} | {TEAL.email} | KvK {TEAL.kvk} | BTW {TEAL.btw}</div>
    </div>
  </div>;
}

// ── PDF ──
function exportPDF(d){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const m=20,pw=170;
  let y=m;
  const NL=d.lang==='nl';
  const L=d.lang;
  const totals=calcTotals(d);
  const grand=totals.grandClient;

  const addFooter=()=>{
    const pc=doc.getNumberOfPages();
    for(let i=1;i<=pc;i++){
      doc.setPage(i);doc.setFontSize(7);doc.setTextColor(153,153,153);doc.setFont('helvetica','normal');
      doc.text(TEAL.addr+', '+TEAL.zip,m,288);
      doc.text(TEAL.name+' | '+TEAL.email,85,288);
      doc.text('KvK '+TEAL.kvk+' | BTW '+TEAL.btw,145,288);
      doc.text(`${i}/${pc}`,190,292,{align:'right'});
    }
  };
  const checkPage=(need=12)=>{if(y>280-need){doc.addPage();y=m}};
  const txt=(text,sz,opts={})=>{
    doc.setFontSize(sz);doc.setFont('helvetica',opts.b?'bold':'normal');
    if(opts.c)doc.setTextColor(...opts.c);else doc.setTextColor(17,17,17);
    checkPage(sz*.5);
    if(opts.w){const lines=doc.splitTextToSize(text||'',opts.w);doc.text(lines,m+(opts.x||0),y);y+=lines.length*sz*.38;}
    else{doc.text(text||'',m+(opts.x||0),y);y+=sz*.42;}
  };
  const line=()=>{doc.setDrawColor(212,236,230);doc.setLineWidth(.5);doc.line(m,y,190,y);y+=4;};
  const gap=(n=3)=>{y+=n};

  // Header
  txt('TEAL',20,{b:true});y-=2;
  doc.setFontSize(12);doc.setTextColor(85,85,85);doc.setFont('helvetica','normal');
  doc.text(NL?'Offerte':'Quotation',m,y);y+=4;
  doc.setFontSize(9);doc.setTextColor(153,153,153);
  doc.text(d.ref,m,y);y+=8;

  // Meta + client
  doc.setFontSize(9);doc.setTextColor(153,153,153);
  doc.text('Project',m,y);doc.text(NL?'Datum':'Date',m,y+5);doc.text(NL?'Geldig':'Valid',m,y+10);
  doc.setTextColor(17,17,17);doc.setFont('helvetica','bold');
  doc.text(d.project.name||'[Project]',m+25,y);doc.setFont('helvetica','normal');
  doc.text(d.project.date?new Date(d.project.date).toLocaleDateString(NL?'nl-NL':'en-GB'):'-',m+25,y+5);
  doc.text(`${d.conditions.validity} ${NL?'dagen':'days'}`,m+25,y+10);

  if(d.client.name){
    doc.setFont('helvetica','bold');doc.text(d.client.name,120,y);doc.setFont('helvetica','normal');
    let cy=y+5;
    if(d.client.contact){doc.text(d.client.contact,120,cy);cy+=4;}
    if(d.client.email){doc.text(d.client.email,120,cy);cy+=4;}
    if(d.client.addr){doc.text(d.client.addr,120,cy);cy+=4;}
    if(d.client.zip||d.client.city)doc.text(`${d.client.zip} ${d.client.city}`,120,cy);
  }
  y+=18;line();

  // Description
  if(t(d.project.description,L)){txt(NL?'PROJECTOMSCHRIJVING':'PROJECT DESCRIPTION',10,{b:true,c:[7,20,18]});gap();
  txt(t(d.project.description,L),9,{w:pw});gap(4);}
  if(t(d.project.tealRole,L)){txt(NL?'Rol van TEAL':"TEAL's Role",9,{b:true});txt(t(d.project.tealRole,L),9,{w:pw});gap(4);}
  if(t(d.project.exclusions,L)){txt(NL?'Niet inbegrepen':'Exclusions',9,{b:true});txt(t(d.project.exclusions,L),9,{w:pw});gap(4);}
  line();

  // Scope
  txt(NL?'SCOPE EN AANPAK':'SCOPE OF WORK',10,{b:true,c:[7,20,18]});gap();
  d.phases.forEach(ph=>{
    const desc=t(ph.description,L);
    if(desc){checkPage(20);txt(`${ph.code} - ${t(ph.name,L)}`,9,{b:true});txt(desc,9,{w:pw});if(ph.effort)txt(`${NL?'Inzet':'Effort'}: ${ph.effort}`,8,{c:[153,153,153]});gap(3);}
  });
  line();

  // Investment table
  txt(NL?'INVESTERING':'INVESTMENT',10,{b:true,c:[7,20,18]});gap(4);
  d.phases.forEach((ph,pi)=>{
    const pd=totals.phaseData[pi];
    if(!pd||pd.total===0)return;
    checkPage();
    doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(17,17,17);
    doc.text(`${ph.code} - ${t(ph.name,L)}`,m,y);
    doc.text(fmtE(pd.total),190,y,{align:'right'});y+=5;
  });
  if(totals.procClient>0){checkPage();doc.setFontSize(9);doc.text(NL?'Materialen en inkoop':'Materials and procurement',m,y);doc.text(fmtE(totals.procClient),190,y,{align:'right'});y+=5;}
  if(totals.subClient>0){checkPage();doc.text(NL?'Onderaanneming':'Subcontractors',m,y);doc.text(fmtE(totals.subClient),190,y,{align:'right'});y+=5;}
  gap(2);
  doc.setLineWidth(.3);doc.setDrawColor(17,17,17);doc.line(m,y,190,y);y+=4;
  doc.setFont('helvetica','bold');doc.setFontSize(10);
  doc.text(NL?'Totaal excl. BTW':'Total (excl. VAT)',m,y);doc.text(fmtE(grand),190,y,{align:'right'});y+=6;
  doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(153,153,153);
  doc.text(`${NL?'Reiskosten':'Travel'}: \u20AC ${d.travel?.rateNL||0.50}/km`,m,y);y+=6;
  doc.setTextColor(17,17,17);line();

  // Planning
  txt(NL?'PLANNING':'PLANNING',10,{b:true,c:[7,20,18]});gap(4);
  d.phases.forEach(ph=>{
    checkPage();
    let sd='';
    if(d.project.date&&ph.startWeek>=0){const dt=new Date(d.project.date);dt.setDate(dt.getDate()+(ph.startWeek||0)*7);sd=dt.toLocaleDateString(NL?'nl-NL':'en-GB',{day:'numeric',month:'short',year:'numeric'})}
    doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(17,17,17);
    doc.text(`${ph.code} - ${t(ph.name,L)}`,m,y);
    doc.text(`${ph.durationWeeks||4} ${NL?'weken':'weeks'}`,120,y);
    doc.text(sd,155,y);
    y+=5;
  });
  gap(2);line();

  // Payment
  txt(NL?'BETALINGSSCHEMA':'PAYMENT SCHEDULE',10,{b:true,c:[7,20,18]});gap();
  d.payment.milestones.forEach(ms=>{checkPage();
    doc.setFontSize(9);doc.setFont('helvetica','normal');
    doc.text(`${t(ms.name,L)} (${ms.pct}%)`,m,y);doc.text(fmtE(grand*ms.pct/100),190,y,{align:'right'});y+=5;
  });
  gap(2);doc.setFontSize(8);doc.setTextColor(153,153,153);
  doc.text(NL?`Betalingstermijn: ${d.conditions.paymentTerm} dagen na factuurdatum.`:`Payment due within ${d.conditions.paymentTerm} days.`,m,y);y+=6;
  doc.setTextColor(17,17,17);line();

  // Conditions
  txt(NL?'VOORWAARDEN':'TERMS & CONDITIONS',10,{b:true,c:[7,20,18]});gap();
  doc.setFontSize(9);doc.setFont('helvetica','normal');
  const conds=[
    NL?`- Deze offerte is geldig tot ${d.conditions.validity} dagen na dagtekening.`:`- Valid for ${d.conditions.validity} days.`,
    NL?'- Prijzen exclusief BTW.':'- Prices exclude VAT.',
    NL?`- Garantie: ${t(d.conditions.warranty,L)}.`:`- Warranty: ${t(d.conditions.warranty,L)}.`,
  ];
  if(d.conditions.avNL)conds.push(NL?'- Op deze offerte zijn de Algemene Voorwaarden van TEAL B.V. van toepassing (bijgevoegd).':'- The General Terms and Conditions of TEAL B.V. apply (attached).');
  conds.forEach(l=>{checkPage();doc.text(l,m,y);y+=5;});

  addFooter();
  doc.save(`TEAL_${NL?'Offerte':'Quotation'}_${(d.project.name||'Draft').replace(/\s+/g,'_')}_v${d.project.version}.pdf`);
}

// ── App ──
function App(){
  const[d,setD]=useState(null);
  const[tab,setTab]=useState('project');

  useEffect(()=>{const h=loadHash();if(h){setD(h);history.replaceState(null,'',location.pathname)}},[]);
  useEffect(()=>{if(d)save(d)},[d]);

  const sel=type=>{
    if(type==='load'){const r=load();if(r)setD(r);}
    else{setD(createProject(type));setTab('project');}
  };

  const tabs=[
    {id:'project',label:'Project'},{id:'scope',label:'Scope'},
    {id:'budget',label:'Budget'},{id:'planning',label:'Planning'},
    {id:'payment',label:'Betaling'},{id:'preview',label:'Preview'},
  ];

  return <div className="app">
    <Header data={d} onPdf={()=>exportPDF(d)} setData={setD}/>
    {d&&<TabNav tabs={tabs} active={tab} onChange={setTab}/>}
    <div className="main">
      {!d?<Start onSelect={sel}/>:<>
        <div className="between mb16">
          <div><span style={{fontSize:11,fontWeight:700,letterSpacing:1,textTransform:'uppercase',color:'#555'}}>{d.type} offerte</span>
            {d.project.name&&<span style={{marginLeft:8,color:'#999'}}>{d.project.name}</span>}
            <span style={{marginLeft:8,fontSize:11,color:'#999'}}>{d.ref}</span>
          </div>
          <button className="btn btn-sm btn-g" onClick={()=>{if(confirm('Nieuwe offerte starten? Huidige data blijft in localStorage.'))setD(null)}}>Nieuw</button>
        </div>
        {tab==='project'&&<ProjectTab data={d} set={setD}/>}
        {tab==='scope'&&<ScopeTab data={d} set={setD}/>}
        {tab==='budget'&&<BudgetTab data={d} set={setD}/>}
        {tab==='planning'&&<PlanningTab data={d} set={setD}/>}
        {tab==='payment'&&<PaymentTab data={d} set={setD}/>}
        {tab==='preview'&&<PreviewTab data={d}/>}
      </>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
